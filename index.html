<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云上党 · 数字地图</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="entry-page">
  <main class="entry-shell">
    <!-- 左侧：品牌介绍 -->
    <section class="entry-brand">
      <h1>云上党 · <span>数字地图</span></h1>
      <p>以高德地图为底图，联动古树名木点位详情与生态数据大屏。<br />
         选择下方图层，进入对应的专题地图界面。</p>
      <div class="entry-stats">
        <div><b>53</b>条古树名木</div>
        <div><b>5</b>个专题图层</div>
        <div><b>1</b>个数据大屏</div>
      </div>
    </section>
    <!-- 右侧：5 个图层按钮 -->
    <section class="entry-cards">
      <!-- 古树名木：已上线，跳转到 map.html -->
      <a class="entry-card" style="--card-color:#1f9d64;--card-shadow:rgba(31,157,100,.3)" href="map.html">
        <span class="entry-icon">树</span>
        <div class="entry-card-body">
          <h3>古树名木</h3>
          <p>53 条真实古树名木点位，含详情弹窗与数据大屏</p>
        </div>
        <span class="entry-arrow">&#8250;</span>
      </a>
      <!-- 林场资源：独立页面 -->
      <a class="entry-card" style="--card-color:#2a8c3a;--card-shadow:rgba(42,140,58,.3)" href="forest.html">
        <span class="entry-icon">林</span>
        <div class="entry-card-body">
          <h3>林场资源</h3>
          <p>重点林场与防护林分布专题图层</p>
        </div>
        <span class="entry-arrow">&#8250;</span>
      </a>
      <!-- 特色农产品：独立页面 -->
      <a class="entry-card" style="--card-color:#f3b63f;--card-shadow:rgba(243,182,63,.3)" href="agri.html">
        <span class="entry-icon">农</span>
        <div class="entry-card-body">
          <h3>特色农产品</h3>
          <p>上党区特色农产品种植区专题图层</p>
        </div>
        <span class="entry-arrow">&#8250;</span>
      </a>
      <!-- 文旅景点：独立页面 -->
      <a class="entry-card" style="--card-color:#3fa7d6;--card-shadow:rgba(63,167,214,.3)" href="tour.html">
        <span class="entry-icon">游</span>
        <div class="entry-card-body">
          <h3>文旅景点</h3>
          <p>文旅景点与古镇资源专题图层</p>
        </div>
        <span class="entry-arrow">&#8250;</span>
      </a>
      <!-- 保护规划：独立页面 -->
      <a class="entry-card" style="--card-color:#7b88d1;--card-shadow:rgba(123,136,209,.3)" href="plan.html">
        <span class="entry-icon">划</span>
        <div class="entry-card-body">
          <h3>保护规划</h3>
          <p>古树保护核心区与示范带规划图层</p>
        </div>
        <span class="entry-arrow">&#8250;</span>
      </a>
    </section>
  </main>
  <script>
    // 所有图层已上线，点击卡片直接跳转
  </script>
</body>
</html>
