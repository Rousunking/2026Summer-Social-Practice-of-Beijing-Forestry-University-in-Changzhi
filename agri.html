<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云上党 · 特色农产品专题地图</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="map-page">
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>云上党 · 特色农产品专题地图</h1>
        <p>上党区特色农产品种植区专题图层。</p>
      </div>
      <nav class="nav">
        <a href="index.html">返回首页</a>
        <a class="primary" href="map.html">古树名木地图</a>
      </nav>
    </header>
    <section class="grid">
      <aside class="panel sidebar">
        <input id="search" class="search" placeholder="搜索农产品、乡镇" />
        <div class="layers">
          <button class="layer active" data-layer="grain">粮食作物</button>
          <button class="layer" data-layer="fruit">林果特产</button>
          <button class="layer" data-layer="vegetable">蔬菜种植</button>
          <button class="layer" data-layer="herb">中药材</button>
        </div>
        <div id="pointList" class="list"></div>
      </aside>
      <section class="panel map-wrap">
        <div id="map"></div>
        <div id="fallbackMap" class="fallback-map">
          <div class="fallback-region"></div>
          <div id="fallbackPopup" class="fallback-popup"></div>
        </div>
        <div id="status" class="status">特色农产品专题图层展示中</div>
        <button id="centerBtn" class="center-btn">居中上党区</button>
      </section>
    </section>
  </main>
  <script src="config.js?v=20260702"></script>
  <script src="data.js?v=20260702"></script>
  <script>
    const AGRI_DATA = {
      grain: [
        { id: "G001", name: "优质玉米基地", town: "北呈乡", area: "5000亩", product: "玉米", lng: 112.98, lat: 36.08, desc: "高产优质玉米种植示范区" },
        { id: "G002", name: "绿色谷子基地", town: "西火镇", area: "3000亩", product: "谷子", lng: 113.11, lat: 35.96, desc: "有机谷子种植基地" },
        { id: "G003", name: "小麦高产田", town: "郝家庄镇", area: "4500亩", product: "小麦", lng: 113.00, lat: 36.10, desc: "小麦连片种植示范区" },
        { id: "G004", name: "杂粮种植区", town: "南宋镇", area: "2000亩", product: "杂粮", lng: 113.05, lat: 35.94, desc: "豆类、黍子等杂粮种植" },
      ],
      fruit: [
        { id: "F001", name: "核桃种植基地", town: "荫城镇", area: "2500亩", product: "核桃", lng: 113.14, lat: 35.97, desc: "优质核桃经济林" },
        { id: "F002", name: "花椒种植区", town: "八义镇", area: "1800亩", product: "花椒", lng: 112.99, lat: 35.96, desc: "大红袍花椒基地" },
        { id: "F003", name: "苹果园", town: "苏店镇", area: "1200亩", product: "苹果", lng: 113.12, lat: 36.11, desc: "红富士苹果种植" },
        { id: "F004", name: "葡萄采摘园", town: "韩店街道", area: "300亩", product: "葡萄", lng: 113.06, lat: 36.04, desc: "设施葡萄种植" },
      ],
      vegetable: [
        { id: "V001", name: "设施蔬菜基地", town: "郝家庄镇", area: "1500亩", product: "蔬菜", lng: 113.02, lat: 36.12, desc: "日光温室蔬菜种植" },
        { id: "V002", name: "韭菜种植区", town: "北呈乡", area: "800亩", product: "韭菜", lng: 112.99, lat: 36.06, desc: "优质韭菜生产基地" },
        { id: "V003", name: "食用菌基地", town: "振兴新区", area: "500亩", product: "食用菌", lng: 113.08, lat: 36.00, desc: "香菇、平菇种植" },
        { id: "V004", name: "大葱种植区", town: "南宋镇", area: "600亩", product: "大葱", lng: 113.07, lat: 35.95, desc: "上党大葱特色种植" },
      ],
      herb: [
        { id: "H001", name: "党参种植基地", town: "西火镇", area: "1000亩", product: "党参", lng: 113.10, lat: 35.97, desc: "潞党参种植示范区" },
        { id: "H002", name: "黄芩种植区", town: "荫城镇", area: "800亩", product: "黄芩", lng: 113.15, lat: 35.98, desc: "中药材黄芩种植" },
        { id: "H003", name: "柴胡种植基地", town: "八义镇", area: "600亩", product: "柴胡", lng: 113.01, lat: 35.97, desc: "柴胡规范化种植" },
      ],
    };
    const LAYER_LABELS = { grain: "粮食作物", fruit: "林果特产", vegetable: "蔬菜种植", herb: "中药材" };
    const LAYER_COLORS = { grain: "#f3b63f", fruit: "#e0a020", vegetable: "#4cae50", herb: "#7b88d1" };
    let currentLayer = "grain";
    let activeId = null;
    function qs(sel, root=document){ return root.querySelector(sel); }
    function qsa(sel, root=document){ return [...root.querySelectorAll(sel)]; }
    function esc(v){ return String(v ?? "").replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function currentData(){ return AGRI_DATA[currentLayer] || []; }
    function renderList(){
      const data = currentData();
      const keyword = qs("#search").value.trim().toLowerCase();
      const rows = keyword ? data.filter(p => [p.name, p.town, p.product].some(v => String(v).toLowerCase().includes(keyword))) : data;
      qs("#pointList").innerHTML = rows.map(p => `<div class="item ${p.id===activeId?'active':''}" data-id="${esc(p.id)}">
        <strong>${esc(p.name)}</strong>
        <span>${esc(p.town)}｜${esc(p.product)}｜${esc(p.area)}</span>
      </div>`).join("");
      qsa(".item").forEach(el => el.addEventListener("click", () => selectPoint(el.dataset.id)));
    }
    function updateListActive(){
      qsa("#pointList .item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === activeId);
      });
    }
    function pointXY(p){
      const allData = Object.values(AGRI_DATA).flat();
      const pts = allData.filter(x => Number.isFinite(x.lng) && Number.isFinite(x.lat));
      const lngs = pts.map(x => x.lng), lats = pts.map(x => x.lat);
      const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
      const minLat = Math.min(...lats), maxLat = Math.max(...lats);
      return {
        x: (p.lng - minLng) / Math.max(maxLng - minLng, .0001) * 72 + 14,
        y: (1 - (p.lat - minLat) / Math.max(maxLat - minLat, .0001)) * 68 + 17
      };
    }
    function renderFallback(){
      const fm = qs("#fallbackMap");
      fm.classList.add("visible");
      fm.querySelectorAll(".layer-dot").forEach(dot => dot.remove());
      currentData().forEach(p => {
        if(!Number.isFinite(p.lng) || !Number.isFinite(p.lat)) return;
        const {x,y} = pointXY(p);
        const dot = document.createElement("span");
        dot.className = `layer-dot ${p.id===activeId ? "active" : ""}`;
        dot.style.left = `${x}%`;
        dot.style.top = `${y}%`;
        dot.style.background = LAYER_COLORS[currentLayer];
        dot.textContent = p.product.charAt(0);
        dot.title = p.name;
        dot.addEventListener("click", () => selectPoint(p.id));
        fm.appendChild(dot);
      });
    }
    function pointHtml(p){
      return `<div class="popup">
        <div class="popup-head">
          <span class="popup-kicker">${LAYER_LABELS[currentLayer]}</span>
          <h3>${esc(p.name)}</h3>
          <div class="popup-tags">
            <span class="tag-sample">${esc(p.product)}</span>
            <span>${esc(p.town)}</span>
          </div>
        </div>
        <div class="popup-facts">
          <div class="fact-location"><b>位置</b><span>${esc(p.town)}</span></div>
          <div><b>种植面积</b><span>${esc(p.area)}</span></div>
          <div><b>主要产品</b><span>${esc(p.product)}</span></div>
        </div>
        <p class="popup-source">${esc(p.desc)}</p>
      </div>`;
    }
    function selectPoint(id){
      activeId = id;
      const p = currentData().find(x => x.id === id);
      updateListActive();
      renderFallback();
      const popup = qs("#fallbackPopup");
      const {x, y} = pointXY(p);
      popup.innerHTML = `<button class="popup-close" title="关闭">&times;</button>` + pointHtml(p);
      popup.style.left = `${x}%`;
      popup.style.top = `${y}%`;
      popup.classList.toggle("flip-below", y < 30);
      popup.classList.add("visible");
      popup.querySelector(".popup-close")?.addEventListener("click", closeInfo);
    }
    function closeInfo(){
      activeId = null;
      updateListActive();
      qs("#fallbackPopup")?.classList.remove("visible");
      renderFallback();
    }
    function toggleLayer(layerName){
      currentLayer = layerName;
      qsa(".layer").forEach(btn => btn.classList.toggle("active", btn.dataset.layer === layerName));
      activeId = null;
      qs("#fallbackPopup")?.classList.remove("visible");
      renderList();
      renderFallback();
      qs("#status").innerHTML = `${LAYER_LABELS[layerName]}图层已显示`;
    }
    qsa(".layer").forEach(btn => btn.addEventListener("click", () => toggleLayer(btn.dataset.layer)));
    qs("#search").addEventListener("input", () => { renderList(); renderFallback(); });
    qs("#fallbackPopup")?.addEventListener("click", e => e.stopPropagation());
    qs("#fallbackMap")?.addEventListener("click", e => { if(e.target === e.currentTarget && activeId) closeInfo(); });
    qs("#centerBtn").addEventListener("click", () => {
      qs("#status").innerHTML = "地图已居中到上党区";
      setTimeout(() => {
        qs("#status").innerHTML = `${LAYER_LABELS[currentLayer]}专题图层展示中`;
      }, 2500);
    });
    renderList();
    renderFallback();
  </script>
</body>
</html>
